services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: oj-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: online-judge
    networks:
      - oj-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: oj-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - oj-network

  # MinIO
  minio:
    image: minio/minio:latest
    container_name: oj-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    networks:
      - oj-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oj-backend
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5000:5000"

    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_problems:/app/problems

    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/online-judge
      REDIS_URL: redis://redis:6379
      STORAGE_BASE_PATH: /app/problems
      MINIO_ENDPOINT: http://minio:9000
      JUDGE_SERVICE_URL: http://judge:5010
      CORS_ORIGIN: http://localhost:5173

    depends_on:
      - mongodb
      - redis
      - minio

    networks:
      - oj-network

    command: npm run dev

  # Judge Service
  judge:
    build:
      context: ./judge
      dockerfile: Dockerfile
    container_name: oj-judge
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5010:5010"

    volumes:
      - ./judge:/app
      - ./judge/temp:/app/temp
      - /app/node_modules
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      PORT: 5010

      MAX_MEMORY: 256m
      MAX_CPU: 0.5
      EXECUTION_TIMEOUT: 5

    privileged: true

    networks:
      - oj-network

    command: npm run dev

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development

    container_name: oj-frontend
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "5173:5173"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

    networks:
      - oj-network

    command: npm run dev -- --host

networks:
  oj-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  minio_data:
  backend_problems: